<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Versus Apple Oficial</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f5f7;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 { text-align:center; }
.insta { text-align:center; color:#6e6e73; margin-bottom:15px; }

h3 { margin-top:25px; }

input, select {
    width:100%;
    padding:14px;
    margin-top:8px;
    border-radius:12px;
    border:1px solid #d2d2d7;
}

button {
    width:100%;
    padding:16px;
    margin-top:25px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#6a0dad,#8e44ad);
    color:#fff;
    font-weight:bold;
}

.footer {
    font-size:12px;
    text-align:center;
    margin-top:15px;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

<h2>Versus Apple Oficial</h2>
<div class="insta">@versusappleoficial</div>

<h3>Dados Pessoais</h3>
<input id="nome" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<input type="date" id="nascimento">
<input id="email" placeholder="E-mail">
<input id="telefone" placeholder="Telefone (WhatsApp)">

<h3>Compra</h3>

<div style="font-size:13px; color:#6e6e73;">
Aparelhos com disponibilidade
</div>

<select id="aparelho">
<option value="">Selecione</option>
<option>11 Pro Max 256GB</option>
<option>12 Pro Max 256GB</option>
<option>13 Normal 256GB</option>
<option>13 Pro Max 256GB</option>
<option>14 Normal 256GB</option>
<option>14 Pro 256GB</option>
<option>14 Pro Max 256GB</option>
<option>15 Normal 256GB</option>
<option>15 Plus 256GB</option>
<option>15 Pro 256GB</option>
<option>15 Pro Max 256GB</option>
<option>16 Normal 256GB</option>
<option>16 Pro 256GB</option>
<option>16 Pro Max 256GB</option>
<option>17 Normal 256GB</option>
<option>17 Air 256GB</option>
<option>17 Pro 256GB</option>
<option>17 Pro Max 256GB</option>
<option>PlayStation 5 Slim 1TB</option>
</select>

<input id="vencimento" placeholder="Dia de vencimento das parcelas">

<div style="font-size:12px; color:#777;">
Cores a consultar com o atendente
</div>

<h3>Endereço</h3>
<input id="cep" placeholder="CEP" onblur="buscarCEP()">
<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">

<button onclick="enviar()">Finalizar Cadastro</button>

<div class="footer">
🔒 Seus dados são utilizados apenas para análise e envio do pedido.
</div>

</div>

<script>

// CEP automático
function buscarCEP(){
 let cep = document.getElementById("cep").value.replace(/\D/g,'');
 if(cep.length==8){
 fetch(`https://viacep.com.br/ws/${cep}/json/`)
 .then(r=>r.json())
 .then(d=>{
  document.getElementById("rua").value=d.logradouro||"";
  document.getElementById("bairro").value=d.bairro||"";
  document.getElementById("cidade").value=d.localidade||"";
  document.getElementById("estado").value=d.uf||"";
 });
 }
}

// ENVIAR
function enviar(){

let nome = document.getElementById("nome").value;
let cpf = document.getElementById("cpf").value;
let nascimento = document.getElementById("nascimento").value;
let email = document.getElementById("email").value;
let telefone = document.getElementById("telefone").value;

let aparelho = document.getElementById("aparelho").value;
let vencimento = document.getElementById("vencimento").value;

let cep = document.getElementById("cep").value;
let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let bairro = document.getElementById("bairro").value;
let cidade = document.getElementById("cidade").value;
let estado = document.getElementById("estado").value;

if(!nome || !cpf || !telefone || !aparelho){
 alert("Preencha os campos obrigatórios");
 return;
}

let mensagem = `Cadastro - Versus Apple Oficial

Nome: ${nome}
CPF: ${cpf}
Nascimento: ${nascimento}
E-mail: ${email}
Telefone: ${telefone}

📱 Aparelho: ${aparelho}
📅 Vencimento: ${vencimento}

Endereço:
CEP: ${cep}
Rua: ${rua}, Nº ${numero}
Bairro: ${bairro}
Cidade: ${cidade}
Estado: ${estado}

🌐 Site:
https://sandwiche.me/vsapplestore`;

let url = "https://wa.me/5511944967694?text=" + encodeURIComponent(mensagem);

window.location.href = url;

}
</script>

</body>
</html>
