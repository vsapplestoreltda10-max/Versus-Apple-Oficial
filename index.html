<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Versus Apple Oficial</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f5f7;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
    text-align: center;
}

.insta {
    text-align: center;
    color: #6e6e73;
    margin-bottom: 15px;
}

.toptext {
    text-align: center;
    font-size: 14px;
    margin-bottom: 20px;
}

h3 {
    margin-top: 25px;
}

input, select {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border-radius: 12px;
    border: 1px solid #d2d2d7;
    background: #fafafa;
}

button {
    width: 100%;
    padding: 16px;
    margin-top: 25px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #6a0dad, #8e44ad);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.footer {
    text-align: center;
    font-size: 12px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Versus Apple Oficial</h2>
<div class="insta">@versusappleoficial</div>

<div class="toptext">
Preencha seu cadastro para dar continuidade ao seu pedido
</div>

<h3>Dados Pessoais</h3>
<input id="nome" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<input type="date" id="nascimento">
<input id="email" placeholder="E-mail">
<input id="telefone" placeholder="Telefone">

<h3>Compra</h3>
<select id="aparelho">
<option value="">Selecione</option>
<option>11 Pro Max 256GB</option>
<option>12 Pro Max 256GB</option>
<option>13 Normal 256GB</option>
<option>13 Pro Max 256GB</option>
<option>14 Normal 256GB</option>
<option>14 Pro 256GB</option>
<option>14 Pro Max 256GB</option>
<option>15 Normal 256GB</option>
<option>15 Plus 256GB</option>
<option>15 Pro 256GB</option>
<option>15 Pro Max 256GB</option>
<option>16 Normal 256GB</option>
<option>16 Pro 256GB</option>
<option>16 Pro Max 256GB</option>
<option>17 Normal 256GB</option>
<option>17 Air 256GB</option>
<option>17 Pro 256GB</option>
<option>17 Pro Max 256GB</option>
</select>

<input id="vencimento" placeholder="Dia de vencimento">

<h3>Endereço</h3>
<input id="cep" placeholder="CEP" onblur="buscarCEP()">
<input id="rua" placeholder="Rua">
<input id="numero" placeholder="Número">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">

<button onclick="enviar()">Finalizar Cadastro</button>

<div class="footer">
🔒 Dados protegidos. Uso exclusivo para análise e envio do pedido.
</div>

</div>

<script>

// VALIDAR CPF
function validarCPF(cpf) {
 cpf = cpf.replace(/[^\d]+/g,'');
 if(cpf.length !== 11) return false;
 if (/^(\d)\1+$/.test(cpf)) return false;

 let soma = 0;
 for (let i=0; i<9; i++) soma += parseInt(cpf.charAt(i)) * (10 - i);
 let resto = 11 - (soma % 11);
 if (resto >= 10) resto = 0;
 if (resto != parseInt(cpf.charAt(9))) return false;

 soma = 0;
 for (let i=0; i<10; i++) soma += parseInt(cpf.charAt(i)) * (11 - i);
 resto = 11 - (soma % 11);
 if (resto >= 10) resto = 0;
 if (resto != parseInt(cpf.charAt(10))) return false;

 return true;
}

// CEP
function buscarCEP(){
 let cep = document.getElementById("cep").value.replace(/\D/g,'');
 if(cep.length==8){
 fetch(`https://viacep.com.br/ws/${cep}/json/`)
 .then(r=>r.json())
 .then(d=>{
  rua.value=d.logradouro||"";
  bairro.value=d.bairro||"";
  cidade.value=d.localidade||"";
  estado.value=d.uf||"";
 });
 }
}

// ENVIAR
function enviar(){

let nome = nome.value;
let cpf = cpf.value;
let nascimento = nascimento.value;
let email = email.value;
let telefone = telefone.value;
let aparelho = aparelho.value;

// VALIDAÇÃO
if(!nome || !cpf || !nascimento || !email || !telefone || !aparelho){
 alert("Preencha todos os campos obrigatórios");
 return;
}

if(!validarCPF(cpf)){
 alert("CPF inválido");
 return;
}

// NUMERO PEDIDO
let pedido = Math.floor(Math.random()*90000)+10000;

// CONFIRMAÇÃO
if(!confirm("Confirma envio dos dados?")) return;

// MENSAGEM
let msg = `Pedido #${pedido}

Versus Apple Oficial
@versusappleoficial

Nome: ${nome}
CPF: ${cpf}
Nascimento: ${nascimento}
Email: ${email}
Telefone: ${telefone}

Aparelho: ${aparelho}

🌐 Site:
https://sandwiche.me/vsapplestore`;

window.open("https://wa.me/5511944967694?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
