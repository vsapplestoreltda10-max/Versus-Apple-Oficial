<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Versus Apple Oficial</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f5f7;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 { text-align:center; }
.insta { text-align:center; color:#6e6e73; margin-bottom:20px; }

h3 { margin-top:25px; }

label {
    font-size:13px;
    color:#6e6e73;
    margin-top:10px;
    display:block;
}

input, select {
    width:100%;
    padding:14px;
    margin-top:5px;
    border-radius:12px;
    border:1px solid #d2d2d7;
    background:#fafafa;
}

textarea {
    width:100%;
    padding:14px;
    margin-top:5px;
    border-radius:12px;
    border:1px solid #d2d2d7;
    background:#fafafa;
    min-height:80px;
}

button {
    width:100%;
    padding:16px;
    margin-top:25px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#6a0dad,#8e44ad);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.footer {
    font-size:12px;
    text-align:center;
    margin-top:15px;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

<h2>Versus Apple Oficial</h2>
<div class="insta">@versusappleoficial</div>

<h3>Dados Pessoais</h3>

<label>Nome completo</label>
<input id="nome">

<label>CPF</label>
<input id="cpf">

<label>Data de nascimento</label>
<input type="date" id="nascimento">

<label>E-mail</label>
<input id="email">

<label>Telefone (WhatsApp)</label>
<input id="telefone">

<h3>Compra</h3>

<label>Aparelhos com disponibilidade</label>
<select id="aparelho">
<option value="">Selecione</option>
<option>11 Pro Max 256GB</option>
<option>12 Pro Max 256GB</option>
<option>13 Normal 256GB</option>
<option>13 Pro Max 256GB</option>
<option>14 Normal 256GB</option>
<option>14 Pro 256GB</option>
<option>14 Pro Max 256GB</option>
<option>15 Normal 256GB</option>
<option>15 Plus 256GB</option>
<option>15 Pro 256GB</option>
<option>15 Pro Max 256GB</option>
<option>16 Normal 256GB</option>
<option>16 Pro 256GB</option>
<option>16 Pro Max 256GB</option>
<option>17 Normal 256GB</option>
<option>17 Air 256GB</option>
<option>17 Pro 256GB</option>
<option>17 Pro Max 256GB</option>
<option>PlayStation 5 Slim 1TB</option>
</select>

<label>Dia de vencimento das parcelas</label>
<input id="vencimento">

<div style="font-size:12px; color:#777; margin-top:5px;">
Cores a consultar com o atendente
</div>

<h3>Endereço</h3>

<label>CEP</label>
<input id="cep" onblur="buscarCEP()">

<label>Rua</label>
<input id="rua">

<label>Número</label>
<input id="numero">

<label>Bairro</label>
<input id="bairro">

<label>Cidade</label>
<input id="cidade">

<label>Estado</label>
<input id="estado">

<!-- NOVO CAMPO -->
<label>Observações para entrega</label>
<textarea id="observacao" placeholder="Ex: casa nos fundos, portão preto..."></textarea>

<!-- NOVO ACEITE -->
<label style="display:flex;align-items:center;margin-top:15px;">
<input type="checkbox" id="termos" style="width:auto;margin-right:10px;">
Li e aceito os termos de compra
</label>

<button onclick="enviar()">Finalizar Cadastro</button>

<div class="footer">
🔒 Seus dados são utilizados apenas para análise e envio do pedido.
</div>

</div>

<script>

// CEP automático
function buscarCEP(){
 let cep = document.getElementById("cep").value.replace(/\D/g,'');
 if(cep.length==8){
 fetch(`https://viacep.com.br/ws/${cep}/json/`)
 .then(r=>r.json())
 .then(d=>{
  document.getElementById("rua").value=d.logradouro||"";
  document.getElementById("bairro").value=d.bairro||"";
  document.getElementById("cidade").value=d.localidade||"";
  document.getElementById("estado").value=d.uf||"";
 });
 }
}

// ENVIAR
function enviar(){

let nome = document.getElementById("nome").value;
let cpf = document.getElementById("cpf").value;
let nascimento = document.getElementById("nascimento").value;
let email = document.getElementById("email").value;
let telefone = document.getElementById("telefone").value;

let aparelho = document.getElementById("aparelho").value;
let vencimento = document.getElementById("vencimento").value;

let cep = document.getElementById("cep").value;
let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let bairro = document.getElementById("bairro").value;
let cidade = document.getElementById("cidade").value;
let estado = document.getElementById("estado").value;

// NOVOS
let observacao = document.getElementById("observacao").value;
let termos = document.getElementById("termos").checked;

if(!nome || !cpf || !telefone || !aparelho){
 alert("Preencha os campos obrigatórios");
 return;
}

if(!termos){
 alert("Você precisa aceitar os termos para continuar");
 return;
}

let mensagem = `Cadastro - Versus Apple Oficial

Nome: ${nome}
CPF: ${cpf}
Nascimento: ${nascimento}
E-mail: ${email}
Telefone: ${telefone}

📱 Aparelho: ${aparelho}
📅 Vencimento: ${vencimento}

Endereço:
CEP: ${cep}
Rua: ${rua}, Nº ${numero}
Bairro: ${bairro}
Cidade: ${cidade}
Estado: ${estado}

Observações: ${observacao}

🌐 Site:
https://sandwiche.me/vsapplestore`;

let url = "https://wa.me/5511944967694?text=" + encodeURIComponent(mensagem);

window.location.href = url;

}
</script>

</body>
</html>
