<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Diamond Tecnologia Apple</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f5f7;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 { text-align:center; }
.insta { text-align:center; color:#6e6e73; margin-bottom:20px; }

h3 { margin-top:25px; }

label {
    font-size:13px;
    color:#6e6e73;
    margin-top:10px;
    display:block;
}

input, select, textarea {
    width:100%;
    padding:14px;
    margin-top:5px;
    border-radius:12px;
    border:1px solid #d2d2d7;
    background:#fafafa;
}

button {
    width:100%;
    padding:16px;
    margin-top:25px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#0071e3,#0a84ff);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.footer {
    font-size:12px;
    text-align:center;
    margin-top:15px;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

<h2>Diamond Tecnologia Apple</h2>
<div class="insta">@diamondtecnologiia</div>

<h3>Dados Pessoais</h3>

<label>Nome completo</label>
<input id="nome">

<label>CPF</label>
<input id="cpf" placeholder="000.000.000-00">

<label>Data de nascimento</label>
<input type="date" id="nascimento">

<label>E-mail</label>
<div style="position:relative;">
<input id="email" autocomplete="off">
<div id="sugestoesEmail" style="position:absolute;width:100%;background:#fff;border:1px solid #ccc;border-radius:10px;margin-top:5px;display:none;"></div>
</div>

<label>Telefone (WhatsApp)</label>
<input id="telefone">

<h3>Compra</h3>

<label>Aparelhos com disponibilidade</label>
<select id="aparelho">
<option value="">Selecione</option>
<option>11 Pro Max 256GB</option>
<option>12 Pro Max 256GB</option>
<option>13 Normal 256GB</option>
<option>13 Pro Max 256GB</option>
<option>14 Normal 256GB</option>
<option>14 Pro 256GB</option>
<option>14 Pro Max 256GB</option>
<option>15 Normal 256GB</option>
<option>15 Plus 256GB</option>
<option>15 Pro 256GB</option>
<option>15 Pro Max 256GB</option>
<option>16 Normal 256GB</option>
<option>16 Pro 256GB</option>
<option>16 Pro Max 256GB</option>
<option>17 Normal 256GB</option>
<option>17 Air 256GB</option>
<option>17 Pro 256GB</option>
<option>17 Pro Max 256GB</option>
<option>PlayStation 5 Slim 1TB</option>
</select>

<label>Dia de vencimento das parcelas</label>
<select id="vencimento">
<option value="">Selecione</option>
<option>Dia 5</option>
<option>Dia 10</option>
<option>Dia 15</option>
<option>Dia 20</option>
<option>Dia 25</option>
<option>Dia 30</option>
</select>

<div style="font-size:12px; color:#777; margin-top:5px;">
Cores a consultar com o atendente
</div>

<h3>Endereço</h3>

<label>CEP</label>
<input id="cep" onblur="buscarCEP()">

<label>Rua</label>
<input id="rua">

<label>Número</label>
<input id="numero">

<label>Bairro</label>
<input id="bairro">

<label>Cidade</label>
<input id="cidade">

<label>Estado</label>
<input id="estado">

<label>Observações para entrega</label>
<textarea id="observacao"></textarea>

<label style="display:flex;align-items:center;margin-top:15px;">
<input type="checkbox" id="termos" style="width:auto;margin-right:10px;">
Li e aceito os termos de compra
</label>

<button onclick="enviar()">Finalizar Cadastro</button>

<div class="footer">
🔒 Seus dados são utilizados apenas para análise e envio do pedido.
</div>

</div>

<script>

// CPF
document.getElementById("cpf").addEventListener("input", function(e){
 let v = e.target.value.replace(/\D/g,"");
 if(v.length > 11) v = v.slice(0,11);
 v = v.replace(/(\d{3})(\d)/, "$1.$2");
 v = v.replace(/(\d{3})(\d)/, "$1.$2");
 v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
 e.target.value = v;
});

// TELEFONE
document.getElementById("telefone").addEventListener("input", function(e){
 let v = e.target.value.replace(/\D/g,"");
 if(v.length > 11) v = v.slice(0,11);
 if(v.length > 10){
  v = v.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
 } else if(v.length > 6){
  v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, "($1) $2-$3");
 } else if(v.length > 2){
  v = v.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
 } else {
  v = v.replace(/^(\d*)/, "($1");
 }
 e.target.value = v;
});

// EMAIL
let emailInput = document.getElementById("email");
let box = document.getElementById("sugestoesEmail");
let dominios = ["@gmail.com", "@hotmail.com", "@outlook.com"];

emailInput.addEventListener("input", function(){
 let valor = emailInput.value;
 if(valor.includes("@") || valor.length < 2){
   box.style.display = "none";
   return;
 }
 box.innerHTML = "";
 dominios.forEach(d => {
   let item = document.createElement("div");
   item.style.padding = "10px";
   item.style.cursor = "pointer";
   item.innerText = valor + d;
   item.onclick = () => {
     emailInput.value = valor + d;
     box.style.display = "none";
   };
   box.appendChild(item);
 });
 box.style.display = "block";
});

document.addEventListener("click", function(e){
 if(!emailInput.contains(e.target)){
   box.style.display = "none";
 }
});

// CEP
function buscarCEP(){
 let cep = document.getElementById("cep").value.replace(/\D/g,'');
 if(cep.length==8){
 fetch(`https://viacep.com.br/ws/${cep}/json/`)
 .then(r=>r.json())
 .then(d=>{
  rua.value=d.logradouro||"";
  bairro.value=d.bairro||"";
  cidade.value=d.localidade||"";
  estado.value=d.uf||"";
 });
 }
}

// ENVIAR
function enviar(){

let nome = document.getElementById("nome").value;
let cpf = document.getElementById("cpf").value;
let nascimento = document.getElementById("nascimento").value;
let email = document.getElementById("email").value;
let telefone = document.getElementById("telefone").value;

let aparelho = document.getElementById("aparelho").value;
let vencimento = document.getElementById("vencimento").value;

let cep = document.getElementById("cep").value;
let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let bairro = document.getElementById("bairro").value;
let cidade = document.getElementById("cidade").value;
let estado = document.getElementById("estado").value;

let observacao = document.getElementById("observacao").value;
let termos = document.getElementById("termos").checked;

if(!nome || !cpf || !telefone || !aparelho){
 alert("Preencha os campos obrigatórios");
 return;
}

if(cpf.length < 14){
 alert("CPF incompleto");
 return;
}

if(!termos){
 alert("Você precisa aceitar os termos para continuar");
 return;
}

let mensagem = "Cadastro - Diamond Tecnologia Apple\n\n" +

"🔹 DADOS DO CLIENTE\n" +
"Nome: " + nome + "\n" +
"CPF: " + cpf + "\n" +
"Nascimento: " + nascimento + "\n" +
"E-mail: " + email + "\n" +
"Telefone: " + telefone + "\n\n" +

"🔹 DADOS DA COMPRA\n" +
"Aparelho: " + aparelho + "\n" +
"Vencimento: " + vencimento + "\n\n" +

"🔹 ENDEREÇO\n" +
"CEP: " + cep + "\n" +
"Rua: " + rua + ", Nº " + numero + "\n" +
"Bairro: " + bairro + "\n" +
"Cidade: " + cidade + "\n" +
"Estado: " + estado + "\n\n" +

"🔹 OBSERVAÇÕES\n" +
observacao + "\n\n" +

"🔹 STATUS\nCadastro enviado para análise e aprovação.\n\n" +

"🔹 LINK DA LOJA\nhttps://sandwiche.me/diamondtech";

let url = "https://wa.me/5511944967694?text=" + encodeURIComponent(mensagem);

window.location.href = url;

}
</script>

</body>
</html>
